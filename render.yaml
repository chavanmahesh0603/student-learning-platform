https://student-learning-platform-api-production.up.railway.app/api/healthservices:
  - type: web
    name: student-learning-platform-api
    runtime: java
    rootDir: spring-backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/spring-backend-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "10000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_DAYS
        value: "7"
      - key: FRONTEND_URL
        sync: false
      - key: SEED_DEMO_DATA
        value: "false"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: "Gajanan Admin"
